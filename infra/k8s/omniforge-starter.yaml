apiVersion: v1
kind: Namespace
metadata:
  name: omnimind
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-go
  namespace: omnimind
spec:
  replicas: 1
  selector:
    matchLabels: { app: gateway-go }
  template:
    metadata:
      labels: { app: gateway-go }
    spec:
      containers:
        - name: gateway
          image: gateway-go:latest
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-go
  namespace: omnimind
spec:
  selector: { app: gateway-go }
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-fastapi
  namespace: omnimind
spec:
  replicas: 1
  selector:
    matchLabels: { app: backend-fastapi }
  template:
    metadata:
      labels: { app: backend-fastapi }
    spec:
      containers:
        - name: api
          image: backend-fastapi:latest
          ports:
            - containerPort: 8001
