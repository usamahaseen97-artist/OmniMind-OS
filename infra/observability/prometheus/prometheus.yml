global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: omnimind-backend
    metrics_path: /api/v1/omnicore/infra/metrics/prometheus
    static_configs:
      - targets: ["dynamic-core-service:8001"]
        labels:
          service: omnimind-backend
          env: staging

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
