# OmniMind production ingress — frontend + API split (Sprint 5)

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    upstream api_cluster {
        least_conn;
        server dynamic-core-service:8001 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    upstream web_cluster {
        least_conn;
        server omnimind-frontend:3000 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    server {
        listen 80;
        client_max_body_size 100m;

        location = /healthz {
            proxy_pass http://api_cluster/api/v1/health;
            proxy_http_version 1.1;
        }

        location /api/ {
            proxy_pass http://api_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
        }

        location / {
            proxy_pass http://web_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
