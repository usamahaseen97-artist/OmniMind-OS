# OmniMind V11 — unified production mesh (ingress LB + dynamic core + Redis cache)
# Start:  docker compose up -d --build
# Logs:   docker compose logs -f dynamic-core-service omnimind-ingress-lb omnimind-cache
# Health: curl http://localhost/healthz
# Stream: WebSocket /api/terminal/ws → dark purple terminal dashboard (100% ops logs)
#
# Optional analytics stack: docker compose -f docker-compose.streaming.yml up -d

version: "3.8"

name: omnimind-v11

services:
  omnimind-ingress-lb:
    image: nginx:alpine
    container_name: omnimind-ingress-lb
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      dynamic-core-service:
        condition: service_healthy
    networks:
      - omnimind-production-mesh
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "omnimind.ingress"

  dynamic-core-service:
    build:
      context: ./backend
      dockerfile: ../core_engine/Dockerfile
    container_name: omnimind-dynamic-core
    environment:
      REDIS_HOST: omnimind-cache
      REDIS_PORT: "6379"
      REDIS_ENABLED: "true"
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-OMNIMIND_GLOBAL_DISRUPTIVE_TECH_2026}
      JWT_SECRET_KEY: ${JWT_SIGNING_KEY:-OMNIMIND_GLOBAL_DISRUPTIVE_TECH_2026}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,capacitor://localhost,ionic://localhost}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET:-}
      OMNIMIND_DEPLOYMENT_MESH: omnimind-production-mesh
      OMNIMIND_SERVICE_ROLE: dynamic-core
    expose:
      - "8001"
    depends_on:
      omnimind-cache:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/v1/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 50s
    networks:
      - omnimind-production-mesh
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "8"
        tag: "omnimind.core"

  omnimind-cache:
    image: redis:7-alpine
    container_name: omnimind-cache
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy volatile-lru
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 3
    volumes:
      - cache-persistence:/data
    networks:
      - omnimind-production-mesh
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
        tag: "omnimind.redis"

networks:
  omnimind-production-mesh:
    driver: bridge
    name: omnimind-production-mesh

volumes:
  cache-persistence:
