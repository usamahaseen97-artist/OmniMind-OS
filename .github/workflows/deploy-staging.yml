name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy"
        required: false
        default: "latest"
      rollback:
        description: "Rollback to previous revision"
        type: boolean
        default: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > ~/.kube/config

      - name: Rollback
        if: inputs.rollback
        run: |
          kubectl rollout undo deployment/omnimind-backend -n omnimind
          kubectl rollout undo deployment/omnimind-frontend -n omnimind
          kubectl rollout status deployment/omnimind-backend -n omnimind --timeout=300s

      - name: Deploy
        if: "!inputs.rollback"
        run: |
          TAG="${{ inputs.image_tag }}"
          kubectl set image deployment/omnimind-backend backend=ghcr.io/${{ github.repository_owner }}/omnimind-backend:$TAG -n omnimind
          kubectl set image deployment/omnimind-frontend frontend=ghcr.io/${{ github.repository_owner }}/omnimind-frontend:$TAG -n omnimind
          kubectl rollout status deployment/omnimind-backend -n omnimind --timeout=300s
          kubectl rollout status deployment/omnimind-frontend -n omnimind --timeout=300s

      - name: Smoke test
        if: "!inputs.rollback"
        run: |
          curl -sf "${{ vars.STAGING_API_URL }}/api/v1/health"
          curl -sf "${{ vars.STAGING_API_URL }}/api/v1/omnicore/infra/health"
