name: OmniMind CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Frontend lint
        run: npm run lint --prefix frontend
      - name: Backend typecheck
        run: python -m compileall -q backend
      - name: Compose validate
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.prod.yml config --quiet

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install frontend deps
        run: npm ci --prefix frontend
      - name: Frontend tests
        run: npm run test --prefix frontend
      - name: Backend tests
        run: |
          pip install -r backend/requirements.txt -r backend/requirements-test.txt
          cd backend && pytest tests/ -q

  security-scan:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt || true
      - name: npm audit (frontend)
        run: npm audit --prefix frontend --audit-level=high || true

  build:
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Frontend build
        run: npm ci --prefix frontend && npm run build --prefix frontend
      - name: Backend Docker build
        run: docker build -f core_engine/Dockerfile -t omnimind-backend:ci ./backend
      - name: Backend smoke
        run: |
          docker run -d --name omnimind-ci-api \
            -e REDIS_ENABLED=false \
            -e JWT_SECRET_KEY=ci-smoke-test-secret \
            -p 18001:8001 \
            omnimind-backend:ci
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:18001/api/v1/health && exit 0
            sleep 2
          done
          docker logs omnimind-ci-api
          exit 1
      - name: Teardown
        if: always()
        run: docker rm -f omnimind-ci-api 2>/dev/null || true

  k8s-validate:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Dry-run manifests
        run: |
          kubectl apply --dry-run=client -f infra/k8s/production.yaml
          kubectl apply --dry-run=client -f infra/k8s/canary.yaml
          kubectl apply --dry-run=client -f infra/k8s/blue-green.yaml
