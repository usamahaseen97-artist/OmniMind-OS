name: OmniMind V11 Production Deployment CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: omnimind-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile-and-ship:
    runs-on: ubuntu-latest

    steps:
      - name: Codebase Extraction
        uses: actions/checkout@v4

      - name: Environment Framework Validation
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Dependency Matrix Build
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Sovereign Engine Import Verification
        working-directory: backend
        env:
          REDIS_ENABLED: "false"
          JWT_SECRET_KEY: ci-smoke-test-secret
        run: python -c "from main import app; assert app.title"

      - name: Docker Image Generation & Integration Verification
        run: |
          docker build \
            -f core_engine/Dockerfile \
            -t omnimind-dynamic-core:latest \
            ./backend
          echo "✓ Image compiled with zero breaking faults."

      - name: Compose Stack Manifest Validation
        run: docker compose -f docker-compose.yml config --quiet

      - name: Container Boot Smoke Test
        run: |
          docker run -d --name omnimind-ci-gateway \
            -e REDIS_ENABLED=false \
            -e JWT_SIGNING_KEY=ci-smoke-test-secret \
            -p 18001:8001 \
            omnimind-dynamic-core:latest
          for i in $(seq 1 30); do
            if python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18001/', timeout=2)"; then
              echo "✓ Gateway health probe passed."
              exit 0
            fi
            sleep 2
          done
          echo "Gateway failed to become healthy within 60s"
          docker logs omnimind-ci-gateway
          exit 1

      - name: Teardown CI Container
        if: always()
        run: docker rm -f omnimind-ci-gateway 2>/dev/null || true
